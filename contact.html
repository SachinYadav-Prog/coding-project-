<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
h1{
text-align:center;
background-color:red;
border-radius:10px;
}
.nav{

border-radius:10px;

padding-bottom:10px;
word-spacing: 30px;
}
a{
margin-left:10px;
}
table, th, td {
  border: 1px solid cyan;
}
th, td {
  padding: 10px;
}
.form{
background-color:yellow;
border-radius:10px;
padding-top:10px;
word-spacing: 3px;
width:300px;
height:200px;
margin-left:auto;
margin-right:auto;
margin-top:100px;
text-align:center;
}
button{
margin-left:10px;
margin-top:19px;
border-radius:7px;
}
.m{
margin-right:20px;
}
footer {
  text-align: center;
  padding: 3px;
  background-color: DarkSalmon;

}

  position: fixed;
  bottom: 0;
  width: 100%;
  
}

<body>

<header>
    <h1>Contact me</h1>
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="gallery.html">Gallery</a>
    </div>
</header>
<div class="form">
<form>
    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="user_name" required placeholder="Your name..">
    </div><br>

    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="user_email" required placeholder="Your email..">
    </div><br>

    <div class="m">
        <label for="message">Message:</label>
        <textarea id="message" name="user_message" rows="3" required placeholder="Write your message here.."></textarea>
    </div>

    <div>
        <button type="submit">Send Message</button>
    </div>
</form>
</div>
